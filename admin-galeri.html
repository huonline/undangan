<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Galeri</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#08110c;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#0f1d15;
padding:20px;
border-radius:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
}

h1{
margin-bottom:20px;
}

input{

width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#16251d;
color:white;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

.gallery-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;

}

.gallery-item{

background:#16251d;
border-radius:18px;
overflow:hidden;
padding:10px;

}

.gallery-item img{

width:100%;
height:180px;
object-fit:cover;
border-radius:12px;

}

.gallery-item h3{

font-size:16px;
margin-top:10px;

}

.delete-btn{

margin-top:10px;
background:#dc2626;
width:100%;

}

</style>
</head>

<body>

<div class="container">

<h1>Kelola Galeri Pondok</h1>

<div class="card">

<h2>Tambah Foto</h2>

<input type="text" id="judul" placeholder="Judul foto">

<input type="text" id="gambar" placeholder="Link gambar">

<button id="saveBtn">Simpan Galeri</button>

</div>

<div class="card">

<h2>Daftar Galeri</h2>

<div class="gallery-grid" id="galleryList"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCXxgO0OU9k-LvRhYY7bIuhvVpY5XgMWdk",

authDomain: "nuralam-90162.firebaseapp.com",

projectId: "nuralam-90162",

storageBucket: "nuralam-90162.firebasestorage.app",

messagingSenderId: "371833786531",

appId: "1:371833786531:web:fc49153e527ac617612f16"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const saveBtn = document.getElementById("saveBtn");

const galleryList = document.getElementById("galleryList");

async function loadGallery(){

galleryList.innerHTML = "";

const querySnapshot = await getDocs(collection(db, "galeri"));

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

const div = document.createElement("div");

div.classList.add("gallery-item");

div.innerHTML = `

<img src="${data.gambar}" alt="">

<h3>${data.judul}</h3>

<button class="delete-btn" data-id="${docSnap.id}">
Hapus
</button>

`;

galleryList.appendChild(div);

});

document.querySelectorAll(".delete-btn").forEach((btn)=>{

btn.addEventListener("click", async ()=>{

const id = btn.getAttribute("data-id");

await deleteDoc(doc(db, "galeri", id));

loadGallery();

});

});

}

saveBtn.addEventListener("click", async ()=>{

const judul = document.getElementById("judul").value;

const gambar = document.getElementById("gambar").value;

if(judul==="" || gambar===""){

alert("Isi semua field");

return;

}

await addDoc(collection(db, "galeri"), {

judul: judul,
gambar: gambar,
tanggal: new Date()

});

alert("Galeri berhasil disimpan");

document.getElementById("judul").value = "";

document.getElementById("gambar").value = "";

loadGallery();

});

loadGallery();

</script>

</body>
</html>
